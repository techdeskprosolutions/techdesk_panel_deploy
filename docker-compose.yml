version: '3.8'

# =====================================================
# TechDesk Homelab Core - FINAL 403 FIX
# Folder-based landing page (panel.techdeskpro.com/public)
# Ready for GitHub + Hostinger Docker Manager
# =====================================================

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - homelab-proxy

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - homelab-backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    depends_on:
      - mariadb
    networks:
      - homelab-backend
      - homelab-proxy

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    environment:
      WG_HOST: ${WG_HOST}
      INIT_ENABLED: "true"
      INIT_USERNAME: admin
      INIT_PASSWORD: ${VPN_UI_PASSWORD}
      PORT: 51821
      WG_PORT: 51820
    ports:
      - "51820:51820/udp"
    volumes:
      - wg_easy_data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - homelab-proxy

  # ✅ FINAL FIX: Landing page (runs as root to eliminate 403 forever)
  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    user: "0"   # ← This is the key fix (safe for static files)
    volumes:
      - ./panel.techdeskpro.com/public:/usr/share/nginx/html
    command:
      - sh
      - -c
      - |
        # Create default page if folder is empty or missing
        if [ ! -f /usr/share/nginx/html/index.html ]; then
          cat > /usr/share/nginx/html/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>TechDesk Pro • Homelab</title>
            <style>
                body { font-family: system-ui; text-align: center; padding: 80px 20px; background: #0f172a; color: #e2e8f0; }
                h1 { color: #22d3ee; margin-bottom: 10px; }
                p { font-size: 1.2rem; margin-bottom: 40px; }
                .links a { color: #67e8f9; margin: 0 20px; text-decoration: none; font-size: 1.1rem; }
                .links a:hover { text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>Welcome to TechDesk Pro</h1>
            <p>Your secure homelab control panel</p>
            <div class="links">
                <a href="https://npm.panel.techdeskpro.com">NPM Admin</a>
                <a href="https://db.panel.techdeskpro.com">phpMyAdmin</a>
                <a href="https://vpn.panel.techdeskpro.com">VPN Dashboard</a>
            </div>
        </body>
        </html>
        EOF
        fi
        # Ensure permissions are correct
        chmod -R 755 /usr/share/nginx/html
        exec nginx -g 'daemon off;'
    networks:
      - homelab-proxy

networks:
  homelab-proxy:
    name: homelab-proxy
    driver: bridge
  homelab-backend:
    name: homelab-backend
    driver: bridge

volumes:
  npm_data:
  letsencrypt_data:
  mariadb_data:
  wg_easy_data:
